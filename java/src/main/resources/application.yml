fraud-api:
  base-url: http://localhost:8000
  connect-timeout-ms: 3000
  read-timeout-ms: 5000
  retry:
    max-attempts: 3
    initial-interval-ms: 500
    multiplier: 2.0
    max-interval-ms: 5000
  circuit-breaker:
    failure-threshold: 5
    cooldown-seconds: 30

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:h2:mem:fraudclientdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.frauddetection: INFO
    org.springframework.retry: DEBUG
